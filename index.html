<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LABSOLUTIONS - AR Catalog</title>

  <!-- Third-party libraries (free, CDN-hosted) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <!-- Your project files -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============ INTRO / PRINTABLE MARKERS ============ -->
  <div id="intro-screen">
    <h1>LABSOLUTIONS AR Catalog</h1>
    <p>Point your camera at any catalog page below to see it come alive in AR.</p>
    <div class="marker-grid" id="marker-grid"><!-- filled by js/app.js from catalog.js --></div>
    <button id="start-btn">Start AR Camera</button>
  </div>

  <!-- ============ IN-AR UI ============ -->
  <div id="status-bar">🔍 Point camera at any catalog page</div>
  <div id="info-panel">
    <h3 id="info-title"></h3>
    <p id="info-desc"></p>
  </div>
  <button id="back-btn">⬅ Back</button>

  <!-- ============ AR SCENE (empty shell — filled at runtime by js/app.js) ============ -->
  <a-scene id="ar-scene" style="display:none"
    gesture-detector
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets id="ar-assets"><!-- one <a-asset-item> per catalog entry, added by app.js --></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.6" position="1 1 1"></a-light>
    
    <a-entity id="ar-targets"><!-- one <a-entity targetIndex="N"> per catalog entry, added by app.js --></a-entity>

  </a-scene>

  <!-- Your project files -->
  <script src="js/config/catalog.js"></script>
  <script src="js/gesture-detector.js"></script>
  <script src="js/gesture-handler.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
